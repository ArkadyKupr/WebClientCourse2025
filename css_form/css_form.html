<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>css</title>
    <link rel="stylesheet" href="normalize.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<p class="title">Отправить заявку</p>
<form action="/handler.php" method="post">
    <div class="content">
        <label for="your-name" class="form">Ваше имя</label>
        <input class="text" id="your-name" placeholder="Ваше имя *" name="name">
    </div>

    <div class="content">
        <label for="your-telephone-number" class="form">Ваш номер телефона</label>
        <input class="text" id="your-telephone-number" placeholder="Ваш номер телефона *" name="phone-number">
    </div>

    <div class="content">
        <label for="your-email-or-vk" class="form">Ваш email или VK</label>
        <input class="text" id="your-email-or-vk" placeholder="Ваш email или VK *" name="email-or-vk">
    </div>

    <div class="content">
        <label for="comment" class="form">Комментарий</label>
        <textarea class="textarea" id="comment" rows="10" cols="45" placeholder="Комментарий (не обязательно)"
                  name="comment"></textarea>
    </div>

    <div class="last-content">
        <label for="sending-form" class="lable-of-button">Заполните и отправьте форму, и мы перезвоним Вам по указанному
            номеру<br></label>
        <button type="submit" id="sending-form" class="submit">Отправить заявку</button>
    </div>
</form>
</body>
</html>
